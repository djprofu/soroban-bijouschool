<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Platforma Bijou School</title>
  <link rel="stylesheet" href="stil.css" />
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>

  <!-- Muzică de fundal -->
  <audio id="bg-music" loop autoplay muted>
    <source src="audio/sunet-fundal.mp3" type="audio/mpeg" />
    Browserul tău nu suportă audio.
  </audio>

  <!-- Header -->
  <header class="navbar">
    <div class="container">
      <div class="logo-box">
        <img src="imagini/logo-bijouschool.png" alt="Logo Bijou" />
      </div>
      <nav>
        <ul class="menu">
          <li><a href="acasa.html">Acasă</a></li>
          <li><a href="#">Exerciții</a></li>
          <li><a href="#">Teme</a></li>
          <li><a href="#">Progres</a></li>
          <li><a href="#" onclick="logout()">🔓 Ieșire</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- Conținut principal -->
  <main class="intro">
    <h1>🎉 Bun venit pe platforma Bijou School!</h1>
    <p>Salut, <span id="numeElev">elev</span>! 👋</p>
    <p>Suntem bucuroși să te avem aici. Succes la antrenamente! 🧠✨</p>
  </main>

  <!-- Script pentru numele elevului și sunet -->
  <script>
    const elev = localStorage.getItem('elev_curent');
    if (elev) {
      document.getElementById("numeElev").textContent = elev;
    }

    window.addEventListener("DOMContentLoaded", () => {
      const audio = document.getElementById("bg-music");
      audio.volume = 0.05;
      audio.play().catch(() => {
        console.warn("🔇 Sunetul a fost blocat de browser.");
      });
    });

    function logout() {
      localStorage.removeItem('elev_curent');
      window.location.href = "login.html";
    }
  </script>

</body>
</html>
