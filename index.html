<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bijou School – Soroban</title>
  <link rel="stylesheet" href="stil.css" />
</head>
<body>

  <!-- Bara de navigare -->
  <header class="navbar">
    <div class="nav-container">
      <div class="logo">Bijou School</div>
      <nav class="nav-links">
        <ul>
          <li><a href="#" class="active">Acasă</a></li>
          <li><a href="#">Despre noi</a></li>
          <li class="dropdown">
            <a href="#">Cursuri ▾</a>
            <ul class="dropdown-content">
              <li><a href="#">Soroban copii</a></li>
              <li><a href="#">Citire rapidă</a></li>
            </ul>
          </li>
          <li class="dropdown">
            <a href="#">Înscrieri ▾</a>
            <ul class="dropdown-content">
              <li><a href="#">Formular</a></li>
              <li><a href="#">Taxe și tarife</a></li>
            </ul>
          </li>
          <li><a href="#">Articole</a></li>
          <li><a href="#">Galerie</a></li>
          <li><a href="#">Contact</a></li>
          <li><a href="platforma.html" class="platforma-btn">🔐 Platforma</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- Fundal -->
  <section class="hero">
    <div class="hero-text">
      <h1>🎉 Bun venit la Bijou School – Soroban!</h1>
      <p>🧠 Antrenează-ți mintea cu zâmbet și distracție! ✨</p>
    </div>
  </section>

  <!-- Slideshow -->
  <section class="slideshow-container">
    <div class="slideshow">
      <img src="imagini/soroban1.jpg" alt="Soroban 1" />
      <img src="imagini/soroban2.jpg" alt="Soroban 2" />
      <img src="imagini/soroban3.jpg" alt="Soroban 3" />
      <img src="imagini/soroban4.jpg" alt="Soroban 4" />
      <img src="imagini/soroban5.jpg" alt="Soroban 5" />
    </div>
  </section>

  <script>
    const slideshow = document.querySelector(".slideshow");
    let scrollAmount = 0;

    function slideImages() {
      scrollAmount += 1;
      if (scrollAmount >= slideshow.scrollWidth / 2) {
        scrollAmount = 0;
      }
      slideshow.scrollLeft = scrollAmount;
      requestAnimationFrame(slideImages);
    }

    slideImages();
  </script>

</body>
</html>
